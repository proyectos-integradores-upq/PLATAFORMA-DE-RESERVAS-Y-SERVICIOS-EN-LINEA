<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar Pass | NexusPoint</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="login-container">
        <div class="login-branding">
            <img src="img/logo.png" alt="NexusPoint Logo" class="big-logo">
        </div>
        <div class="login-form-side">
            <div class="form-content">
                <h2><span class="text-secundario">Recuperar</span> Contraseña</h2>
                <p>Introduce tu correo para restablecer tu contraseña.</p>
                <form>
                    <div class="input-group">
                        <p>Correo electrónico</p>
                        <input type="email" placeholder="tu_matricula@nexuspoint.com" required>
                    </div>
                    <button type="submit" class="btn-submit">ENVIAR ENLACE</button>
                    <div class="forgot-container" style="text-align: center; margin-top: 20px;">
                        <a href="login.html" class="forgot-link">← Volver al login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/recuperar.js"></script>
</body>
</html>
