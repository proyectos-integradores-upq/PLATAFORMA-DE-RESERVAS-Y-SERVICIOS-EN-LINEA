<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configurar Usuario | NexusPoint</title>
    <link rel="stylesheet" href="css/app.css">
    <style>
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 53, 102, 0.7); display: none;
            justify-content: center; align-items: center; z-index: 3000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 15px;
            text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .icon-circle { width: 70px; height: 70px; background: #d4edda; color: #28a745; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; margin: 0 auto 20px; }
        .btn-modal-ok { background: var(--color-primario); color: var(--color-secundario); border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 20px; }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <nav class="sidebar">
             <div class="sidebar-header">
                <img src="img/logo.png" alt="NP" class="mini-logo">
                <span>NexusPoint</span>
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="solicitudes.html">Solicitudes</a></li>
                <li><a href="espacios.html">Espacios</a></li>
                <li><a href="usuarios.html" class="active">Usuarios</a></li>
                <li><a href="reportes.html">Reportes</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="perfil.html" class="sidebar-user-link" style="border-color: var(--color-primario); background: rgba(255,255,255,0.1);">
                    <div class="user-avatar">A</div>
                    <div class="user-info">
                        <span class="user-name">Administrador</span>
                        <span class="user-role">Súper Usuario</span>
                    </div>
                </a>
                <a href="login.html" style="color: var(--danger); padding-left: 12px; font-size: 0.85rem; text-decoration: none; font-weight: 600;">Cerrar Sesión</a>
            </div>
        </nav>

        <main class="main-content">
            <header class="section-header">
                <h1 id="form-title">Nuevo <span class="text-primario">Usuario</span></h1>
                <p style="color: var(--color-secundario)">Registra los datos institucionales del usuario.</p>
            </header>

            <section class="form-container-white">
                <form id="userForm" class="grid-form">
                    <div class="input-group">
                        <label>Matrícula / ID</label>
                        <input type="text" placeholder="Ej: D001234" required>
                    </div>
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" placeholder="Nombre y Apellidos" required>
                    </div>
                    <div class="input-group">
                        <label>Correo Institucional</label>
                        <input type="email" placeholder="usuario@nexuspoint.edu" required>
                    </div>
                    <div class="input-group">
                        <label>Departamento</label>
                        <select class="custom-select" required>
                            <option value="" disabled selected>Selecciona departamento...</option>
                            <option>Sistemas Computacionales</option>
                            <option>Ingeniería Industrial</option>
                            <option>Administración</option>
                            <option>Mantenimiento</option>
                            <option>Electrónica</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Rol de Usuario</label>
                        <select class="custom-select" required>
                            <option>Docente</option>
                            <option>Admin</option>
                            <option>Personal</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Estado de Cuenta</label>
                        <select class="custom-select">
                            <option>Activo</option>
                            <option>Pendiente</option>
                            <option>Suspendido</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Guardar Usuario</button>
                        <a href="usuarios.html" class="btn-cancelar">Cancelar</a>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="icon-circle">✓</div>
            <h2 id="modal-title">¡Éxito!</h2>
            <p id="modal-message"></p>
            <button class="btn-modal-ok" onclick="window.location.href='usuarios.html'">Continuar</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isEdit = urlParams.has('id');
        
        if (isEdit) {
            document.getElementById('form-title').innerHTML = 'Editar <span class="text-primario">Usuario</span>';
        }

        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('modal-title').innerText = isEdit ? "Usuario Editado" : "Usuario Creado";
            document.getElementById('modal-message').innerText = isEdit ? "Los datos se han actualizado correctamente." : "El usuario ha sido registrado en el sistema.";
            document.getElementById('successModal').style.display = 'flex';
        });
    </script>
</body>
</html>
